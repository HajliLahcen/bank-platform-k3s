apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-api
  namespace: {{ .Values.namespace }}

spec:

  replicas: {{ .Values.api.replicaCount }}

  selector:
    matchLabels:
      app: flask-api

  template:

    metadata:
      labels:
        app: flask-api

    spec:

      containers:

      - name: flask-api

        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"

        imagePullPolicy: {{ .Values.api.image.pullPolicy }}

        ports:

        - containerPort: 8000

        envFrom:

        - configMapRef:
            name: api-config

        - secretRef:
            name: api-secret
