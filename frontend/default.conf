server {

    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /transfer {
        proxy_pass http://flask-api:8000;
    }

    location /accounts {
        proxy_pass http://flask-api:8000;
    }

    location /balance {
        proxy_pass http://flask-api:8000;
    }

}
